<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Optima Progress Tracker</title>
		<link
			rel="stylesheet"
			href="popup.css"
		/>
	</head>
	<body>
		<main>
			<div class="navbar">
				<span>Optima Progress</span>
				<div class="grow"></div>
				<button
					type="button"
					id="copyTableBtn"
					class="icon-btn"
				>
					<svg
						xmlns="http://www.w3.org/2000/svg"
						width="20"
						height="20"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="2"
						stroke-linecap="round"
						stroke-linejoin="round"
						class="lucide lucide-copy-icon lucide-copy"
					>
						<rect
							width="14"
							height="14"
							x="8"
							y="8"
							rx="2"
							ry="2"
						/>
						<path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
					</svg>
				</button>
				<button
					type="button"
					id="closeBtn"
					class="icon-btn"
				>
					<svg
						xmlns="http://www.w3.org/2000/svg"
						width="24"
						height="24"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="2"
						stroke-linecap="round"
						stroke-linejoin="round"
						class="lucide lucide-x-icon lucide-x"
					>
						<path d="M18 6 6 18" />
						<path d="m6 6 12 12" />
					</svg>
				</button>
			</div>
			<table id="results">
				<thead>
					<tr>
						<th>Class</th>
						<th>Done</th>
						<th>Todo</th>
						<th>Future</th>
					</tr>
				</thead>
				<tbody></tbody>
			</table>
		</main>
		<script src="browser-polyfill.min.js"></script>
		<script src="popup.js"></script>
	</body>
</html>
