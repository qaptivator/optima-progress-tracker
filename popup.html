<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Optima Progress Tracker</title>
		<link
			rel="stylesheet"
			href="popup.css"
		/>
	</head>
	<body>
		<main id="app">
			<!-- Main Navbar -->
			<div
				class="navbar"
				id="navbar-main"
			>
				<span>Optima Progress</span>
				<div class="grow"></div>
				<div class="segmented-control">
					<input
						type="radio"
						id="mode-counts"
						name="mode"
						value="counts"
						checked
					/>
					<label for="mode-counts">Counts</label>
					<input
						type="radio"
						id="mode-todo"
						name="mode"
						value="todo"
					/>
					<label for="mode-todo">TODO</label>
					<input
						type="radio"
						id="mode-grades"
						name="mode"
						value="grades"
					/>
					<label for="mode-grades">Grades</label>
				</div>
				<button
					type="button"
					id="settingsBtn"
					class="icon-btn"
				>
					<svg
						xmlns="http://www.w3.org/2000/svg"
						width="20"
						height="20"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="2"
						stroke-linecap="round"
						stroke-linejoin="round"
						class="lucide lucide-settings-icon lucide-settings"
					>
						<path
							d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915"
						/>
						<circle
							cx="12"
							cy="12"
							r="3"
						/>
					</svg>
				</button>
				<button
					type="button"
					id="quitBtn"
					class="icon-btn"
				>
					<svg
						xmlns="http://www.w3.org/2000/svg"
						width="24"
						height="24"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="2"
						stroke-linecap="round"
						stroke-linejoin="round"
						class="lucide lucide-x-icon lucide-x"
					>
						<path d="M18 6 6 18" />
						<path d="m6 6 12 12" />
					</svg>
				</button>
			</div>

			<!-- Settings Navbar -->
			<div
				class="navbar hidden"
				id="navbar-settings"
			>
				<span>Settings</span>
				<div class="grow"></div>
				<button
					type="button"
					id="closeSettingsBtn"
					class="icon-btn"
				>
					<svg
						xmlns="http://www.w3.org/2000/svg"
						width="24"
						height="24"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="2"
						stroke-linecap="round"
						stroke-linejoin="round"
						class="lucide lucide-x-icon lucide-x"
					>
						<path d="M18 6 6 18" />
						<path d="m6 6 12 12" />
					</svg>
				</button>
			</div>

			<!-- Table View -->
			<div id="view-table">
				<table id="results">
					<thead>
						<tr>
							<th>Class</th>
							<th>Done</th>
							<th>Todo</th>
							<th>Future</th>
						</tr>
					</thead>
					<tbody></tbody>
				</table>
			</div>

			<!-- Settings View -->
			<div
				id="view-settings"
				class="hidden"
			>
				<div class="settings-group">
					<label for="blacklist">Blacklisted Classes (one per line)</label>
					<textarea
						id="blacklist"
						rows="6"
						placeholder="Class Name 1&#10;Class Name 2"
					></textarea>
				</div>

				<div class="settings-group row">
					<label for="theme-select">Appearance</label>
					<div class="grow"></div>
					<select id="theme-select">
						<option value="system">System</option>
						<option value="light">Light</option>
						<option value="dark">Dark</option>
					</select>
				</div>

				<div class="settings-actions">
					<button
						type="button"
						id="copyTableBtn"
						class="action-btn"
					>
						<svg
							xmlns="http://www.w3.org/2000/svg"
							width="18"
							height="18"
							viewBox="0 0 24 24"
							fill="none"
							stroke="currentColor"
							stroke-width="2"
							stroke-linecap="round"
							stroke-linejoin="round"
							class="lucide lucide-copy"
						>
							<rect
								width="14"
								height="14"
								x="8"
								y="8"
								rx="2"
								ry="2"
							/>
							<path
								d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"
							/>
						</svg>
						<span>Copy Current Table</span>
					</button>
				</div>
			</div>
		</main>
		<script src="browser-polyfill.min.js"></script>
		<script src="popup.js"></script>
	</body>
</html>
